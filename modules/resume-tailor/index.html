<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumes — Pathfinder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%25' y='50%25' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">
  <link rel="stylesheet" href="../shared/pathfinder.css">
  <style>
    /* ====== Resume Hub Styles ====== */
    body {
      animation: fadeIn 200ms ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .resume-hub-container {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      padding: var(--space-6);
      padding-top: calc(var(--nav-height) + var(--space-6));
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ====== Header ====== */
    .resume-hub-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-4);
      flex-wrap: wrap;
    }

    .resume-hub-title {
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .resume-hub-subtitle {
      margin: var(--space-1) 0 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    .resume-search-wrapper {
      min-width: 260px;
    }

    .resume-search-wrapper .form-input {
      width: 100%;
      padding: var(--space-2) var(--space-4);
      border: 1px solid var(--bg-subtle);
      border-radius: 6px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 14px;
    }

    .resume-search-wrapper .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
    }

    /* ====== Filter Tabs ====== */
    .resume-filters {
      display: flex;
      gap: var(--space-2);
      border-bottom: 2px solid var(--bg-subtle);
      padding-bottom: 0;
    }

    .resume-filter-btn {
      padding: var(--space-2) var(--space-4);
      background: none;
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .resume-filter-btn:hover {
      color: var(--text-primary);
    }

    .resume-filter-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .filter-count {
      background: var(--bg-subtle);
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .resume-filter-btn.active .filter-count {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
    }

    /* ====== Resume Grid ====== */
    .resume-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: var(--space-4);
    }

    .resume-card {
      display: flex;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--bg-surface);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      transition: all 150ms ease;
      align-items: flex-start;
    }

    .resume-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.08);
      transform: translateY(-1px);
    }

    .resume-card-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 2px;
    }

    .resume-card-body {
      flex: 1;
      min-width: 0;
    }

    .resume-card-company {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .resume-card-title {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .resume-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }

    .resume-type-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border: 1px solid;
      border-radius: 12px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .resume-app-badge {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 12px;
      background: var(--bg-elevated);
      color: var(--text-secondary);
    }

    .resume-meta-item {
      font-size: 0.75rem;
      color: var(--text-tertiary);
    }

    .resume-card-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      flex-shrink: 0;
    }

    .resume-action-btn {
      padding: 4px 12px;
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-sm);
      background: var(--bg-surface);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: all 150ms ease;
      white-space: nowrap;
    }

    .resume-action-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* ====== Empty State ====== */
    .resume-empty {
      text-align: center;
      padding: var(--space-12) var(--space-6);
      color: var(--text-secondary);
    }

    .resume-empty-icon {
      font-size: 3rem;
      margin-bottom: var(--space-4);
    }

    .resume-empty-title {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .resume-empty-message {
      font-size: 0.9rem;
      max-width: 400px;
      margin: 0 auto;
    }

    /* ====== Tip Box ====== */
    .resume-hub-tip {
      background: rgba(99, 102, 241, 0.06);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: var(--radius-md);
      padding: var(--space-4) var(--space-5);
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .resume-hub-tip a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .resume-hub-tip a:hover {
      text-decoration: underline;
    }

    .resume-hub-tip strong {
      color: var(--text-primary);
    }

    .resume-hub-tip em {
      color: var(--text-primary);
      font-style: normal;
      font-weight: 500;
    }

    /* ====== Responsive ====== */
    @media (max-width: 768px) {
      .resume-hub-header {
        flex-direction: column;
      }

      .resume-search-wrapper {
        min-width: 100%;
      }

      .resume-grid {
        grid-template-columns: 1fr;
      }

      .resume-card {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <main class="resume-hub-container" role="main">
    <div id="resume-hub-content">
      <div class="resume-empty">
        <div class="resume-empty-icon">⏳</div>
        <div class="resume-empty-title">Loading resumes...</div>
      </div>
    </div>
  </main>

  <script src="../shared/data-layer.js?v=3.10.1"></script>
  <script src="../shared/components.js?v=3.10.1"></script>
  <script src="../shared/command-palette.js?v=3.10.1"></script>
  <script src="./resume-tailor.js?v=3.10.1"></script>
</body>
</html>
