<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Pathfinder — Research Brief</title>
  <meta name="description" content="Research Brief: Role analysis, company insights, and fit assessment">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%236366f1' width='32' height='32'/><text x='50%' y='50%' font-size='20' font-weight='700' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='system-ui'>P</text></svg>">

  <!-- Self-healing: purge stale caches before anything else loads -->
  <script>
    (function() {
      var APP_VERSION = '3.0.0';
      var storedVersion = localStorage.getItem('pf_brief_app_version');
      if (storedVersion !== APP_VERSION) {
        console.info('[ResearchBrief] Version changed from ' + (storedVersion || 'none') + ' to ' + APP_VERSION + ' — purging stale caches');
        var keysToRemove = [];
        for (var i = 0; i < localStorage.length; i++) {
          var key = localStorage.key(i);
          if (key && key.startsWith('pf_brief_')) {
            keysToRemove.push(key);
          }
        }
        keysToRemove.forEach(function(key) {
          localStorage.removeItem(key);
          console.info('[ResearchBrief] Purged: ' + key);
        });
        localStorage.setItem('pf_brief_app_version', APP_VERSION);
      }
    })();
  </script>

  <link rel="stylesheet" href="../shared/pathfinder.css?v=3.10.1">
  <script src="https://unpkg.com/lucide@latest" onerror="window._lucideLoaded = false;"></script>
  <script src="../shared/logos.js?v=3.10.1"></script>

  <style>
    /* ====== RESEARCH BRIEF V3 STYLES ====== */

    .research-brief-container {
      display: flex;
      height: calc(100vh - var(--nav-height));
      overflow: hidden;
      margin-top: var(--nav-height);
    }

    /* ====== LEFT SIDEBAR ====== */
    .sidebar {
      width: 340px;
      background: var(--bg-surface);
      border-right: 1px solid var(--bg-subtle);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform var(--duration-normal) var(--ease-default);
      z-index: 50;
      flex-shrink: 0;
    }

    .sidebar.collapsed {
      transform: translateX(-100%);
      position: absolute;
      height: 100%;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4);
      border-bottom: 1px solid var(--bg-subtle);
      flex-shrink: 0;
    }

    .sidebar-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sidebar-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: var(--bg-elevated);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      border: none;
      padding: 0;
    }

    .sidebar-toggle:hover {
      background: var(--bg-subtle);
      color: var(--text-primary);
    }

    .sidebar-content {
      flex: 1;
      padding: var(--space-4);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* ── Role Card Strip ─────────────────────────────────────── */
    .role-strip {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 8px 12px;
      scrollbar-width: none;
      flex-wrap: wrap;
      flex-shrink: 0;
      border-bottom: 1px solid var(--bg-subtle);
      background: var(--bg-surface);
    }
    .role-strip::-webkit-scrollbar { display: none; }

    .role-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 5px;
      background: var(--bg-base);
      border: 1.5px solid var(--bg-subtle);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      max-width: 100%;
      overflow: hidden;
    }

    .role-chip:hover {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.04);
    }

    .role-chip.active {
      border-color: var(--accent);
      background: rgba(99, 102, 241, 0.1);
      box-shadow: 0 0 0 2px var(--accent-subtle);
    }

    .role-chip-logo {
      width: 18px;
      height: 18px;
      border-radius: 3px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .role-chip-text {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 0;
    }

    .role-chip-company {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .role-chip-title {
      font-size: 9px;
      color: var(--text-tertiary);
      line-height: 1.2;
      word-break: break-word;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .company-card {
      padding: var(--space-3);
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .company-card-logo {
      width: 100%;
      height: 48px;
      background: var(--bg-surface);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .company-card-logo img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    .company-card-name {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
    }

    .company-card-meta {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    .sidebar-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      margin-top: auto;
      padding-top: var(--space-4);
      border-top: 1px solid var(--bg-subtle);
    }

    .btn {
      padding: var(--space-3) var(--space-4);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-default);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      font-family: inherit;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--bg-subtle);
    }

    .btn-ghost:hover {
      background: var(--bg-elevated);
      color: var(--text-primary);
    }

    /* ====== RIGHT PANEL: BRIEF AREA ====== */
    .brief-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .brief-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-6);
      border-bottom: 1px solid var(--bg-subtle);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    .brief-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
    }

    .brief-subtitle {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      margin-top: var(--space-2);
    }

    .brief-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* ====== SECTION CARDS ====== */
    .section {
      background: var(--bg-elevated);
      border: 1px solid var(--bg-subtle);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      transition: all var(--duration-normal) var(--ease-default);
    }

    .section.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1), inset 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .section.pending { opacity: 0.6; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--bg-subtle);
    }

    .section-title-group {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      flex: 1;
    }

    .section-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 32px;
      height: 32px;
      padding: 0 var(--space-2);
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent);
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: var(--text-sm);
      flex-shrink: 0;
    }

    .section-title {
      font-size: var(--text-lg);
      font-weight: 600;
      color: var(--text-primary);
    }

    .section-status {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    .section-content {
      line-height: 1.6;
      color: var(--text-primary);
    }

    .section-content p { margin: 0 0 var(--space-3) 0; font-size: var(--text-base); }
    .section-content p:last-child { margin-bottom: 0; }
    .section-content strong { font-weight: 600; color: var(--text-primary); }
    .section-content em { font-style: italic; color: var(--text-secondary); }

    .section-content ul, .section-content ol {
      margin: var(--space-3) 0 var(--space-3) var(--space-4);
      padding-left: var(--space-3);
    }

    .section-content li { margin-bottom: var(--space-2); }

    .section-content table {
      width: 100%;
      border-collapse: collapse;
      margin: var(--space-4) 0;
      font-size: var(--text-sm);
    }

    .section-content th,
    .section-content td {
      padding: var(--space-3);
      text-align: left;
      border-bottom: 1px solid var(--bg-subtle);
    }

    .section-content th {
      background: var(--bg-surface);
      font-weight: 600;
      color: var(--text-primary);
    }

    .section-content td { color: var(--text-primary); }

    .section-meta {
      margin-top: var(--space-6);
      padding-top: var(--space-4);
      border-top: 1px solid var(--bg-subtle);
      display: flex;
      justify-content: space-between;
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    .section-meta-item {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }

    /* ====== EMPTY STATE ====== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: var(--space-4);
      color: var(--text-secondary);
    }

    .empty-state-icon { font-size: 48px; opacity: 0.3; }

    .empty-state-text {
      font-size: var(--text-base);
      text-align: center;
    }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 100;
      }
      .sidebar-toggle { display: flex; }
      .brief-content { padding: var(--space-4); }
    }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <div class="research-brief-container">
    <!-- LEFT SIDEBAR: Role selector + company card -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Roles</div>
        <button id="sidebarToggle" class="sidebar-toggle" title="Close sidebar">
          <span>✕</span>
        </button>
      </div>

      <div id="roleStrip" class="role-strip"></div>

      <div class="sidebar-content">
        <div id="companyCard" class="company-card" style="display: none;">
          <div class="company-card-logo" id="companyLogo"></div>
          <div class="company-card-name" id="companyName"></div>
          <div class="company-card-meta">
            <div><strong>Role:</strong> <span id="roleTitle"></span></div>
            <div><strong>Location:</strong> <span id="roleLocation"></span></div>
          </div>
        </div>

        <div class="sidebar-actions">
          <button id="generateBtn" class="btn btn-primary" style="display: none;">
            Generate Brief
          </button>
          <button id="clearCacheBtn" class="btn btn-ghost" style="display: none;">
            Clear Cache
          </button>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL: Brief display -->
    <div class="brief-area">
      <div class="brief-header">
        <div>
          <div class="brief-title">Research Brief</div>
          <div class="brief-subtitle" id="briefSubtitle"></div>
        </div>
      </div>

      <div id="sectionsArea" class="brief-content" role="main" aria-live="polite">
        <div class="empty-state">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-text">
            <p><strong>Select a role to view its research brief</strong></p>
            <p style="font-size: var(--text-sm); margin-top: var(--space-2); color: var(--text-tertiary);">
              Choose from your pipeline roles on the left
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../shared/data-layer.js?v=3.10.1"></script>
  <script src="../shared/mcp-client.js?v=3.10.1"></script>
  <script src="../shared/components.js?v=3.10.1"></script>
  <script src="../shared/command-palette.js?v=3.10.1"></script>
  <script src="./research-brief.js?v=3.10.1"></script>
</body>
</html>
